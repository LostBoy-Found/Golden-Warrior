<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#000000">
<title>Golden Warrior</title>
<style>
:root {
  color-scheme: dark;
  --bg:         #000000;
  --s1:         #1C1C1E;
  --s2:         #2C2C2E;
  --s3:         #3A3A3C;
  --sep:        rgba(84,84,88,0.45);
  --t1:         #FFFFFF;
  --t2:         rgba(235,235,245,0.62);
  --t3:         rgba(235,235,245,0.30);
  --gold:       #D4A017;
  --gold-bg:    rgba(212,160,23,0.12);
  --gold-sep:   rgba(212,160,23,0.28);
  --green:      #30D158;
  --red:        #FF453A;
  --orange:     #FF9F0A;
  --nav-h:      62px;
  --r:          12px;
  --r-sm:       8px;
  --font:       -apple-system,'SF Pro Display','Helvetica Neue',Helvetica,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;}
html{color-scheme:dark;}
html,body{height:100%;overflow:hidden;}
body{
background:var(–bg);
color:var(–t1);
font-family:var(–font);
font-size:15px;
-webkit-font-smoothing:antialiased;
display:flex;flex-direction:column;
max-width:430px;margin:0 auto;
}

/* ── HEADER ── */
.header{
height:52px;
background:rgba(18,18,20,0.96);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border-bottom:0.5px solid var(–sep);
display:flex;align-items:center;justify-content:space-between;
padding:0 16px;flex-shrink:0;z-index:10;
}
.header-title{
font-size:17px;font-weight:700;letter-spacing:-0.01em;
display:flex;align-items:center;gap:7px;
}
.header-sword{color:var(–gold);}
.icon-btn{
height:32px;min-width:32px;
background:var(–s2);border:none;border-radius:16px;
padding:0 12px;
color:var(–t2);font-family:var(–font);
font-size:14px;font-weight:600;
letter-spacing:0.01em;cursor:pointer;
transition:background .12s, color .12s;
display:flex;align-items:center;justify-content:center;
}
.icon-btn.active{color:var(–gold);background:var(–gold-bg);}
.icon-btn:active{opacity:.65;}

/* ── REST TIMER ── */
.timer-bar{
background:#060500;
border-bottom:0.5px solid var(–gold-sep);
padding:8px 14px;
display:none;align-items:center;gap:10px;flex-shrink:0;
}
.timer-bar.show{display:flex;}
.timer-count{
font-size:24px;font-weight:800;color:var(–gold);
min-width:58px;font-variant-numeric:tabular-nums;
letter-spacing:-0.03em;transition:color .2s;
}
.timer-count.urgent{color:var(–red);}
.timer-count.done{color:var(–green);}
.timer-track{
flex:1;height:3px;background:var(–s3);
border-radius:2px;overflow:hidden;
}
.timer-fill{
height:100%;background:var(–gold);
border-radius:2px;width:100%;
transition:background .3s;
}
.timer-fill.urgent{background:var(–red);}
.timer-presets{display:flex;gap:4px;}
.timer-pre{
background:var(–s2);border:none;border-radius:6px;
padding:5px 7px;color:var(–t3);
font-family:var(–font);font-size:11px;font-weight:600;
cursor:pointer;transition:all .12s;
}
.timer-pre.sel{background:var(–gold-bg);color:var(–gold);}
.timer-pre:active{opacity:.65;}
.timer-btns{display:flex;gap:6px;}
.timer-ctrl{
width:30px;height:30px;border-radius:50%;border:none;
background:var(–s2);color:var(–t1);
font-family:var(–font);font-size:12px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
}
.timer-ctrl:active{opacity:.65;}

/* ── SCROLL ── */
.scroll{
flex:1;overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding:14px 14px 10px;
}
.scroll::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
.nav{
background:rgba(18,18,20,0.96);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-top:0.5px solid var(–sep);
height:var(–nav-h);display:flex;flex-shrink:0;
padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-item{
flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;
border:none;background:none;color:var(–t3);
cursor:pointer;gap:2px;transition:color .15s;
}
.nav-item.active{color:var(–gold);}
.nav-item:active{opacity:.6;}
.nav-d{font-size:17px;font-weight:800;line-height:1;letter-spacing:-0.01em;}
.nav-s{font-size:9px;font-weight:600;text-transform:uppercase;
letter-spacing:.04em;line-height:1;}

/* ── DAY HEADER ── */
.day-hdr{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;padding:0 2px;
}
.day-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;
text-transform:uppercase;letter-spacing:.05em;}
.badge-upper{background:rgba(10,132,255,.13);color:#5AABFF;}
.badge-lower{background:rgba(48,209,88,.13);color:#5ECF7A;}
.badge-both{background:rgba(255,159,10,.13);color:#FFB340;}

/* ── EXERCISE CARD ── */
.ex-card{
background:var(–s1);border-radius:var(–r);
margin-bottom:8px;overflow:hidden;
}
.ex-hdr{
padding:14px 16px;cursor:pointer;
display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
user-select:none;-webkit-user-select:none;
transition:background .1s;
}
.ex-hdr:active{background:var(–s2);}
.ex-meta{flex:1;min-width:0;}
.ex-num{font-size:10px;font-weight:700;color:var(–gold);
letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px;}
.ex-opt{display:inline-block;font-size:10px;font-weight:600;
background:var(–s2);color:var(–t3);padding:1px 7px;
border-radius:10px;margin-bottom:3px;}
.ex-name{font-size:16px;font-weight:700;line-height:1.25;
margin-bottom:8px;letter-spacing:-0.01em;}
.ex-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ex-tag{font-size:11px;font-weight:600;padding:3px 8px;
border-radius:6px;letter-spacing:.02em;}
.t-sets{background:rgba(10,132,255,.12);color:#5AABFF;}
.t-reps{background:rgba(48,209,88,.12);color:#5ECF7A;}
.t-rest{background:rgba(255,159,10,.12);color:#FFB340;}
.t-prog{background:rgba(212,160,23,.12);color:var(–gold);}
.ex-chev{
color:var(–t3);font-size:12px;margin-top:3px;flex-shrink:0;
transition:transform .22s cubic-bezier(.4,0,.2,1);
line-height:1;
}
.ex-card.open .ex-chev{transform:rotate(180deg);}

/* ── EXERCISE BODY ── */
.ex-body{display:none;border-top:0.5px solid var(–sep);}
.ex-card.open .ex-body{display:block;}
.info-block{padding:10px 16px;border-bottom:0.5px solid var(–sep);}
.info-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.09em;color:var(–t3);margin-bottom:4px;}
.info-txt{font-size:13px;color:var(–t2);line-height:1.55;}
.notes-btn{
width:100%;background:none;border:none;
border-bottom:0.5px solid var(–sep);
padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
cursor:pointer;color:var(–gold);font-family:var(–font);
font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
transition:background .1s;
}
.notes-btn:active{background:var(–s2);}
.notes-btn-icon{font-size:11px;color:var(–t3);transition:transform .2s;}
.notes-btn.open .notes-btn-icon{transform:rotate(180deg);}
.notes-body{display:none;padding:12px 16px 14px;font-size:13.5px;
color:var(–t2);line-height:1.7;background:rgba(0,0,0,.2);
border-bottom:0.5px solid var(–sep);}
.notes-body.show{display:block;}

/* ── LOGGER ── */
.logger{padding:12px 14px 14px;}
.logger-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logger-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
letter-spacing:.09em;color:var(–gold);}
.logger-right{display:flex;align-items:center;gap:8px;}
.logger-prev{font-size:11px;color:var(–t3);font-weight:500;}
.logger-acts{display:flex;gap:5px;}
.act{font-family:var(–font);font-size:12px;font-weight:600;
padding:5px 11px;border-radius:7px;border:none;cursor:pointer;
transition:opacity .12s;}
.act:active{opacity:.6;}
.act-add{background:rgba(48,209,88,.12);color:var(–green);}
.act-clr{background:rgba(255,69,58,.12);color:var(–red);}

.col-hdrs{
display:grid;grid-template-columns:26px 1fr 1fr 36px 28px;
gap:6px;margin-bottom:5px;
}
.col-hdr{font-size:10px;font-weight:600;text-transform:uppercase;
letter-spacing:.06em;color:var(–t3);text-align:center;}

.set-row{
display:grid;grid-template-columns:26px 1fr 1fr 36px 28px;
gap:6px;align-items:center;margin-bottom:7px;
transition:opacity .18s;
}
.set-row.done{opacity:.38;}
.s-num{font-size:12px;font-weight:700;color:var(–t3);
text-align:center;font-variant-numeric:tabular-nums;}
.s-in{
width:100%;background:var(–s2);border:none;border-radius:var(–r-sm);
color:var(–t1);font-family:var(–font);font-size:16px;font-weight:700;
padding:9px 4px;text-align:center;
-webkit-appearance:none;appearance:none;outline:none;
font-variant-numeric:tabular-nums;
transition:background .12s;
}
.s-in::-webkit-inner-spin-button,.s-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.s-in[type=number]{-moz-appearance:textfield;}
.s-in:focus{background:var(–s3);}
.s-in.ghost::placeholder{color:rgba(212,160,23,.42);font-weight:500;font-size:14px;}
.s-in::placeholder{color:var(–t3);font-weight:500;font-size:14px;}
.done-btn{
width:36px;height:36px;border-radius:9px;
border:1.5px solid var(–s3);background:var(–s2);
color:transparent;font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all .15s;flex-shrink:0;
}
.done-btn.on{background:rgba(48,209,88,.15);border-color:var(–green);color:var(–green);}
.done-btn:active{opacity:.6;}
.del-btn{
width:28px;height:28px;border-radius:7px;
border:none;background:transparent;
color:var(–t3);font-size:18px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:color .12s;flex-shrink:0;
}
.del-btn:active{color:var(–red);}

.rest-row{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.rest-btn{
flex:1;min-width:0;background:var(–s2);border:none;
border-radius:var(–r-sm);padding:8px 4px;
color:var(–t2);font-family:var(–font);font-size:13px;font-weight:600;
cursor:pointer;text-align:center;transition:opacity .12s;
}
.rest-btn.main{background:var(–gold-bg);color:var(–gold);font-weight:700;}
.rest-btn:active{opacity:.6;}

/* ── SUGGESTION BAR ── */
.sugg-bar{
background:rgba(212,160,23,.06);
border:0.5px solid var(–gold-sep);
border-radius:var(–r-sm);
padding:10px 10px 11px;
margin-bottom:12px;
}
.sugg-top{
display:flex;justify-content:space-between;align-items:center;
margin-bottom:9px;
}
.sugg-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.1em;color:var(–gold);}
.sugg-meta{display:flex;align-items:center;gap:8px;}
.sugg-date{font-size:10px;color:var(–t3);font-weight:500;}
.sugg-fill-all{
font-family:var(–font);font-size:11px;font-weight:700;
padding:4px 11px;border-radius:6px;border:none;
background:var(–gold-bg);color:var(–gold);cursor:pointer;
transition:opacity .12s;
}
.sugg-fill-all:active{opacity:.6;}
.sugg-chips{display:flex;gap:5px;flex-wrap:wrap;}
.sugg-chip{
flex:1;min-width:0;
display:flex;align-items:center;justify-content:center;gap:4px;
background:var(–s2);border-radius:7px;
padding:7px 6px;cursor:pointer;
border:0.5px solid transparent;
transition:opacity .12s;
-webkit-user-select:none;user-select:none;
}
.sugg-chip:active{opacity:.6;}
.sugg-chip.c-wt{border-color:var(–gold-sep);}
.sugg-chip.c-rep{border-color:rgba(48,209,88,.22);}
.sugg-snum{font-size:10px;font-weight:700;color:var(–t3);flex-shrink:0;}
.sugg-val{font-size:12px;font-weight:700;color:var(–t1);
font-variant-numeric:tabular-nums;white-space:nowrap;}
.sugg-arr{font-size:10px;flex-shrink:0;}
.sugg-arr.wt{color:var(–gold);}
.sugg-arr.rep{color:var(–green);}
.sugg-arr.beat{color:var(–t3);}

/* ── WORKOUT BANNER ── */
.workout-banner{
background:#060500;
border-bottom:0.5px solid rgba(48,209,88,.22);
padding:8px 16px;
display:none;align-items:center;justify-content:space-between;
flex-shrink:0;gap:10px;
}
.workout-banner.show{display:flex;}
.wb-left{display:flex;align-items:center;gap:10px;}
.wb-dot{
width:7px;height:7px;border-radius:50%;
background:var(–green);box-shadow:0 0 5px var(–green);
animation:pulse-dot 1.8s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
.wb-info{display:flex;flex-direction:column;gap:0px;}
.wb-day{font-size:11px;font-weight:600;color:var(–t3);letter-spacing:.01em;}
.wb-elapsed{
font-size:19px;font-weight:800;color:var(–green);
font-variant-numeric:tabular-nums;letter-spacing:-0.03em;line-height:1.1;
}
.btn-finish{
font-family:var(–font);font-size:12px;font-weight:700;
padding:7px 16px;border-radius:20px;
border:1.5px solid rgba(255,69,58,.35);
cursor:pointer;background:rgba(255,69,58,.09);color:var(–red);
letter-spacing:.01em;transition:opacity .15s;
}
.btn-finish:active{opacity:.6;}

/* ── START WORKOUT BUTTON ── */
.start-row{padding:0 0 16px;}
.btn-start{
width:100%;font-family:var(–font);font-size:15px;font-weight:700;
padding:14px;border-radius:var(–r);border:none;cursor:pointer;
background:var(–green);color:#000;letter-spacing:.01em;
transition:opacity .15s;
}
.btn-start:active{opacity:.75;}

/* ── SUMMARY OVERLAY ── */
.overlay{
position:fixed;inset:0;z-index:100;
display:none;flex-direction:column;
background:rgba(0,0,0,.72);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
align-items:stretch;justify-content:flex-end;
}
.overlay.show{display:flex;}
.overlay-sheet{
background:var(–s1);border-radius:20px 20px 0 0;
max-height:88vh;display:flex;flex-direction:column;overflow:hidden;
animation:sheet-up .3s cubic-bezier(.32,1,.23,1);
}
@keyframes sheet-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.overlay-handle{
width:36px;height:4px;border-radius:2px;
background:var(–s3);margin:12px auto 0;flex-shrink:0;
}
.overlay-hdr{
padding:16px 20px 12px;border-bottom:0.5px solid var(–sep);
display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;
}
.overlay-title{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.overlay-sub{font-size:13px;color:var(–t2);margin-top:3px;font-weight:500;}
.overlay-close{
width:30px;height:30px;border-radius:50%;
border:none;background:var(–s2);color:var(–t2);
font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
transition:opacity .12s;
}
.overlay-close:active{opacity:.6;}
.overlay-scroll{flex:1;overflow-y:auto;padding:14px 16px 28px;}
.overlay-scroll::-webkit-scrollbar{display:none;}
.summary-stats{
display:grid;grid-template-columns:1fr 1fr 1fr;
gap:8px;margin-bottom:14px;
}
.stat-card{
background:var(–s2);border-radius:var(–r-sm);
padding:13px 8px;text-align:center;
}
.stat-val{font-size:22px;font-weight:900;color:var(–t1);
font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
.stat-lbl{font-size:10px;font-weight:600;color:var(–t3);
text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.stat-val.gold{color:var(–gold);}
.stat-val.green{color:var(–green);}
.summary-ex{
background:var(–s2);border-radius:var(–r-sm);
padding:11px 13px;margin-bottom:6px;
}
.sum-ex-name{font-size:14px;font-weight:700;margin-bottom:7px;}

/* ── LOG PAGE ── */
.log-pg{padding:4px 0 24px;}
.log-empty{
text-align:center;padding:60px 20px;
color:var(–t3);font-size:14px;line-height:1.8;
}
.log-empty-icon{font-size:40px;margin-bottom:14px;opacity:.6;}
.log-session{
background:var(–s1);border-radius:var(–r);
margin-bottom:8px;overflow:hidden;
}
.log-sess-hdr{
padding:13px 15px;cursor:pointer;
display:flex;align-items:center;justify-content:space-between;gap:10px;
user-select:none;-webkit-user-select:none;
transition:background .1s;
}
.log-sess-hdr:active{background:var(–s2);}
.log-sess-left{flex:1;min-width:0;}
.log-sess-date{font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.09em;color:var(–gold);margin-bottom:2px;}
.log-sess-title{font-size:15px;font-weight:700;line-height:1.2;}
.log-sess-chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.log-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;}
.lc-time{background:rgba(48,209,88,.1);color:var(–green);}
.lc-vol{background:rgba(212,160,23,.1);color:var(–gold);}
.lc-sets{background:rgba(10,132,255,.1);color:#5AABFF;}
.log-sess-right{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.log-sess-chev{color:var(–t3);font-size:12px;transition:transform .2s;flex-shrink:0;}
.log-session.open .log-sess-chev{transform:rotate(180deg);}
.log-sess-del{
width:32px;height:32px;border-radius:8px;
border:none;background:transparent;
color:var(–t3);font-size:16px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;transition:color .12s, background .12s;
}
.log-sess-del:active{color:var(–red);background:rgba(255,69,58,.1);}
.log-sess-body{
display:none;border-top:0.5px solid var(–sep);
padding:10px 14px 14px;
}
.log-session.open .log-sess-body{display:block;}
.log-ex-row{
display:flex;flex-direction:column;gap:5px;
padding:9px 0;border-bottom:0.5px solid var(–sep);
}
.log-ex-row:last-child{border-bottom:none;}
.log-ex-name{font-size:13px;font-weight:700;}
.log-ex-sets{display:flex;flex-wrap:wrap;gap:5px;}
.log-set-pill{
font-size:11px;font-weight:600;padding:3px 9px;
border-radius:6px;background:var(–s2);color:var(–t2);
font-variant-numeric:tabular-nums;
}
.log-set-pill.done{background:rgba(48,209,88,.1);color:var(–green);}

/* ── INFO / GUIDE PAGE ── */
.info-pg{padding:4px 0 24px;}
.plans-row{display:flex;gap:8px;margin-bottom:14px;}
.plan-card{flex:1;background:var(–s1);border-radius:var(–r);
padding:13px 8px;text-align:center;}
.plan-letter{font-size:28px;font-weight:900;color:var(–gold);line-height:1;}
.plan-freq{font-size:10px;color:var(–t3);font-weight:600;
text-transform:uppercase;letter-spacing:.05em;margin:4px 0 3px;}
.plan-desc{font-size:12px;color:var(–t2);line-height:1.4;}
.info-note{
background:rgba(212,160,23,.07);border-left:3px solid var(–gold);
border-radius:0 var(–r-sm) var(–r-sm) 0;
padding:11px 14px;font-size:13px;color:var(–t2);
line-height:1.6;margin-bottom:18px;
}
.info-note strong{color:var(–gold);}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
letter-spacing:.1em;color:var(–t3);padding:0 2px 10px;display:block;}
.faq-card{background:var(–s1);border-radius:var(–r);margin-bottom:6px;overflow:hidden;}
.faq-q{padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;
display:flex;justify-content:space-between;align-items:center;
user-select:none;-webkit-user-select:none;transition:background .1s;}
.faq-q:active{background:var(–s2);}

.rpe-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}

<header class="header">
  <div class="header-title">
    <span class="header-sword">⚔</span> Golden Warrior
  </div>
  <button class="icon-btn" id="guideBtn" onclick="switchDay('info')">Guide</button>
</header>

<div class="workout-banner" id="workoutBanner">
  <div class="wb-left">
    <div class="wb-dot"></div>
    <div class="wb-info">
      <div class="wb-day" id="wbDay">—</div>
      <div class="wb-elapsed" id="wbElapsed">0:00</div>
    </div>
  </div>
  <div class="wb-actions">
    <button class="btn-finish" onclick="finishWorkout()">Finish</button>

</div>

  <div class="timer-track"><div class="timer-fill" id="tFill"></div></div>

    <button class="timer-pre" data-s="60"  onclick="startTimer(60)">1:00</button>
    <button class="timer-pre" data-s="90"  onclick="startTimer(90)">1:30</button>
    <button class="timer-pre" data-s="120" onclick="startTimer(120)">2:00</button>

  <div class="timer-btns">

</div>

<div class="scroll" id="scroll"></div>
<nav class="nav" id="nav"></nav>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let activeDay        = localStorage.getItem('gw_day') || 'd1';
const useKg          = true;

// ── WORKOUT SESSION STATE ──
let wktActive        = false;
let wktStartTime     = null;   // ms timestamp
let wktDayId         = null;
let wktRaf           = null;
let activeSessionKey = null;   // unique key per workout (String(startTime))

function loadWorkoutState() {
  try {
    const raw = localStorage.getItem('gw_wkt');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.active && s.startTime && s.dayId && s.sessionKey) {
      wktActive        = true;
      wktStartTime     = s.startTime;
      wktDayId         = s.dayId;
      activeSessionKey = s.sessionKey;
    }
  } catch(e) {}
}

function saveWorkoutState() {
  localStorage.setItem('gw_wkt', JSON.stringify({
    active: wktActive, startTime: wktStartTime,
    dayId: wktDayId, sessionKey: activeSessionKey
  }));
}

function clearWorkoutState() {
  wktActive = false; wktStartTime = null; wktDayId = null;
  activeSessionKey = null;
  localStorage.removeItem('gw_wkt');
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en', { month:'short', day:'numeric' });
}
function fmtTime(s) {
  if (!s) return '—';
  const m = Math.floor(s/60), r = s%60;
  return r===0 ? `${m}min` : `${m}:${r.toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════
// SESSION STORAGE  (timestamp-keyed per workout)
// ═══════════════════════════════════════════════
// Structure: { "1742900000000": { _meta: {dayId,startTime,...}, "d1__bench": [...] } }
function getSessions() {
  try { return JSON.parse(localStorage.getItem('gw_sessions') || '{}'); } catch { return {}; }
}
function saveSessions(s) { localStorage.setItem('gw_sessions', JSON.stringify(s)); }

// Only returns data when a workout is active (fresh slate between workouts)
function getExData(dayId, exId) {
  if (!activeSessionKey) return [];
  const s = getSessions();
  return (s[activeSessionKey] && s[activeSessionKey][`${dayId}__${exId}`]) || [];
}

function setExData(dayId, exId, sets) {
  if (!activeSessionKey) return;
  const s = getSessions();
  if (!s[activeSessionKey]) s[activeSessionKey] = {};
  s[activeSessionKey][`${dayId}__${exId}`] = sets;
  saveSessions(s);
}

// ═══════════════════════════════════════════════
// WORKOUT TIMER
// ═══════════════════════════════════════════════
function fmtElapsed(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function fmtElapsedShort(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function wktTick() {
  if (!wktActive || !wktStartTime) return;
  const el = document.getElementById('wbElapsed');
  if (el) el.textContent = fmtElapsed(Date.now() - wktStartTime);
  wktRaf = requestAnimationFrame(wktTick);
}

function startWorkout(dayId) {
  if (wktActive) return;
  wktActive        = true;
  wktStartTime     = Date.now();
  wktDayId         = dayId;
  activeSessionKey = String(wktStartTime);
  saveWorkoutState();
  const s = getSessions();
  s[activeSessionKey] = { _meta: { dayId, startTime: wktStartTime } };
  saveSessions(s);
  // Show day name in banner
  const day = DAYS.find(d => d.id === dayId);
  const dayEl = document.getElementById('wbDay');
  if (dayEl && day) dayEl.textContent = `${day.label} — ${day.sub}`;
  updateWorkoutUI();
  renderContent();
}

function finishWorkout() {
  if (!wktActive) return;
  const duration   = Date.now() - wktStartTime;
  const dayId      = wktDayId;
  const sessionKey = activeSessionKey;
  // Save end time to meta
  const s = getSessions();
  if (s[sessionKey] && s[sessionKey]._meta) {
    s[sessionKey]._meta.endTime  = Date.now();
    s[sessionKey]._meta.duration = duration;
    saveSessions(s);
  }
  cancelAnimationFrame(wktRaf);
  clearWorkoutState();   // sets activeSessionKey = null
  updateWorkoutUI();
  // Navigate to log tab — this re-renders content and ensures
  // the workout day view is rebuilt fresh when user returns to it
  activeDay = 'log';
  localStorage.setItem('gw_day', 'log');
  renderNav();
  renderContent();
  showSummary(sessionKey, dayId, duration);
}

function updateWorkoutUI() {
  const banner = document.getElementById('workoutBanner');
  if (!banner) return;
  if (wktActive) {
    // Restore day label
    const day = DAYS.find(d => d.id === wktDayId);
    const dayEl = document.getElementById('wbDay');
    if (dayEl && day) dayEl.textContent = `${day.label} — ${day.sub}`;
    banner.classList.add('show');
    cancelAnimationFrame(wktRaf);
    wktRaf = requestAnimationFrame(wktTick);
  } else {

    cancelAnimationFrame(wktRaf);
  }
}

// ═══════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════
function calcVolume(sets) {
  return sets.reduce((acc, s) => {
    const w = parseFloat(s.w) || 0;
    const r = parseInt(s.r)   || 0;
    return acc + (w * r);
  }, 0);
}

function showSummary(sessionKey, dayId, duration) {
  const day  = DAYS.find(d => d.id === dayId);
  const sess = (getSessions()[sessionKey]) || {};
  const unit = 'kg';
  const dLabel    = day ? `${day.label} — ${day.sub}` : 'Workout';
  const startTime = sess._meta?.startTime || parseInt(sessionKey) || Date.now();
  const dateDisp  = fmtDate(new Date(startTime).toISOString().split('T')[0]);

  document.getElementById('sumTitle').textContent = 'Workout Complete 🎯';
  document.getElementById('sumSub').textContent   = `${dLabel} · ${dateDisp}`;

  // Aggregate stats
  let totalVol = 0, totalSets = 0, doneSets = 0;
  const exData = [];
  if (day) {
    day.exercises.forEach(ex => {
      const sets = sess[`${dayId}__${ex.id}`] || [];
      if (!sets.length) return;
      const vol = calcVolume(sets.filter(s => s.w && s.r));
      totalVol  += vol;
      totalSets += sets.length;
      doneSets  += sets.filter(s => s.done).length;
      exData.push({ name: ex.name, sets });
    });
  }

  const durStr  = fmtElapsedShort(duration);
  const volDisp = totalVol > 0
    ? (totalVol >= 1000 ? (totalVol/1000).toFixed(1) + 'k' : Math.round(totalVol).toString())
    : '—';

  let html = `<div class="summary-stats">
    <div class="stat-card">
      <div class="stat-val green">${durStr}</div>
      <div class="stat-lbl">Duration</div>
    </div>
    <div class="stat-card">
      <div class="stat-val gold">${volDisp}</div>
      <div class="stat-lbl">Vol ${unit}</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${doneSets}<span style="font-size:14px;color:var(--t3)">/${totalSets}</span></div>
      <div class="stat-lbl">Sets Done</div>
    </div>
  </div>`;

  exData.forEach(ex => {
    if (!ex.sets.length) return;
    const setPills = ex.sets.map((s, i) => {
      const w = s.w || '—';
      const r = s.r || '—';
      const cls = s.done ? 'done' : '';
      return `<span class="log-set-pill ${cls}">S${i+1}: ${w}×${r}</span>`;
    }).join('');
    html += `<div class="summary-ex">
      <div class="sum-ex-name">${ex.name}</div>
      <div class="log-ex-sets">${setPills}</div>
    </div>`;
  });

  document.getElementById('sumBody').innerHTML = html;
  document.getElementById('summaryOverlay').classList.add('show');
}

function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('show');
}

// LOG PAGE
// ═══════════════════════════════════════════════
function renderLogPage() {
  const sessions = getSessions();
  const unit     = 'kg';

  // All completed sessions: must be a plain object with _meta, exclude active
  const keys = Object.keys(sessions)
    .filter(k => {
      if (k === activeSessionKey) return false;
      const v = sessions[k];
      return v && typeof v === 'object' && !Array.isArray(v) && v._meta;
    })
    .sort((a, b) => {
      const ta = sessions[a]._meta.startTime || parseInt(a) || 0;
      const tb = sessions[b]._meta.startTime || parseInt(b) || 0;
      return tb - ta;
    });

  if (!keys.length) {
    return `<div class="log-pg">
      <div class="log-empty">
        <div class="log-empty-icon">📋</div>
        No workouts logged yet.<br>Complete your first session<br>to see your history here.
      </div>
    </div>`;
  }

  let html = '<div class="log-pg">';

  keys.forEach(sessionKey => {
    const sess      = sessions[sessionKey];
    const meta      = sess._meta || {};
    const day       = DAYS.find(d => d.id === meta.dayId);
    const dayLabel  = day ? `${day.label} — ${day.sub}` : 'Workout';
    const startTime = meta.startTime || parseInt(sessionKey) || 0;
    const dateLabel = fmtDateLong(startTime);

    // Aggregate stats
    let totalVol = 0, totalSets = 0, doneSets = 0;
    const exRows = [];
    const dayId  = meta.dayId;

    if (day) {
      day.exercises.forEach(ex => {
        const sets = sess[`${dayId}__${ex.id}`] || [];
        if (!sets.some(s => s.w || s.r)) return;
        totalVol  += calcVolume(sets.filter(s => s.w && s.r));
        totalSets += sets.length;
        doneSets  += sets.filter(s => s.done).length;
        exRows.push({ name: ex.name, sets });
      });
    }

    const durStr  = meta.duration ? fmtElapsedShort(meta.duration) : null;
    const volDisp = totalVol > 0
      ? (totalVol >= 1000 ? (totalVol/1000).toFixed(1) + 'k ' + unit : Math.round(totalVol) + ' ' + unit)
      : null;

    const chips = [
      durStr  ? `<span class="log-chip lc-time">${durStr}</span>` : '',
      volDisp ? `<span class="log-chip lc-vol">${volDisp}</span>` : '',
      totalSets ? `<span class="log-chip lc-sets">${doneSets}/${totalSets} sets</span>` : ''
    ].join('');

    let exHtml = '';
    exRows.forEach(ex => {
      const pills = ex.sets.map((s, i) => {
        const w = s.w || '—'; const r = s.r || '—';
        return `<span class="log-set-pill ${s.done?'done':''}">${w}×${r}</span>`;
      }).join('');
      exHtml += `<div class="log-ex-row">
        <div class="log-ex-name">${ex.name}</div>
        <div class="log-ex-sets">${pills}</div>
      </div>`;
    });

    html += `<div class="log-session" id="logsess_${sessionKey}">
      <div class="log-sess-hdr" onclick="toggleLogSess('${sessionKey}')">
        <div class="log-sess-left">
          <div class="log-sess-date">${dateLabel}</div>
          <div class="log-sess-title">${dayLabel}</div>
          <div class="log-sess-chips">${chips}</div>
        </div>
        <div class="log-sess-right">
          <button class="log-sess-del" id="delbtn_${sessionKey}"
            onclick="deleteLog('${sessionKey}',event)">🗑</button>
          <span class="log-sess-chev">›</span>
        </div>
      </div>
      <div class="log-sess-body">${exHtml || '<div style="color:var(--t3);font-size:13px;">No sets logged.</div>'}</div>
    </div>`;
  });

  html += '</div>';
  return html;
}

function fmtDateLong(ts) {
  // Accepts a ms timestamp (number) or a YYYY-MM-DD string
  const d = typeof ts === 'number'
    ? new Date(ts)
    : new Date(ts + 'T00:00:00');
  return d.toLocaleDateString('en', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function toggleLogSess(sessionKey) {
  const el = document.getElementById('logsess_' + sessionKey);
  if (el) el.classList.toggle('open');
}

function deleteLog(sessionKey, e) {
  e.stopPropagation();
  const btn = document.getElementById('delbtn_' + sessionKey);
  if (!btn) return;

  if (btn.dataset.armed !== 'true') {
    // First tap — arm
    btn.dataset.armed = 'true';
    btn.textContent   = 'Delete?';
    btn.style.cssText = 'color:var(--red);font-size:10px;font-weight:700;background:rgba(255,69,58,.12);border-radius:7px;padding:0 7px;width:auto;';
    // Auto-disarm after 2.5 s
    setTimeout(() => {
      const b = document.getElementById('delbtn_' + sessionKey);
      if (b && b.dataset.armed === 'true') {
        b.dataset.armed  = 'false';
        b.textContent    = '🗑';
        b.style.cssText  = '';
      }
    }, 2500);
  } else {
    // Second tap — confirmed, delete
    btn.dataset.armed = 'false';
    const s = getSessions();
    delete s[sessionKey];
    saveSessions(s);
    const el = document.getElementById('logsess_' + sessionKey);
    if (el) {
      el.style.transition = 'opacity .18s';
      el.style.opacity    = '0';
      setTimeout(() => renderContent(), 200);
    }
  }
}

// Find most-recent previous session data for this exercise (excludes active session)
function getPrevData(dayId, exId) {
  const s    = getSessions();
  const now  = activeSessionKey ? parseInt(activeSessionKey) : Date.now();
  // All completed sessions (have _meta, not the active one), sorted newest first
  const keys = Object.keys(s)
    .filter(k => k !== activeSessionKey && s[k]._meta)
    .sort((a, b) => {
      const ta = s[a]._meta.startTime || parseInt(a) || 0;
      const tb = s[b]._meta.startTime || parseInt(b) || 0;
      return tb - ta;
    });
  for (const k of keys) {
    const val = s[k][`${dayId}__${exId}`];
    if (val && val.length && val.some(sv => sv.w || sv.r)) {
      const startTime = s[k]._meta.startTime || parseInt(k) || 0;
      return { sets: val, date: new Date(startTime).toISOString().split('T')[0] };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════
// ADAPTIVE PROGRAMMING ENGINE
// ═══════════════════════════════════════════════
const COMPOUND_IDS = new Set([
  'bench','squat1','squat_c','squat_paused','press2',
  'pull1','pull2','row1','dips_chins'
]);

function getIncr(exId) {
  return COMPOUND_IDS.has(exId) ? 2.5 : 1.25;
}

function addWeight(w, exId) {
  const n = parseFloat(w) || 0;
  if (!n) return '';
  const result = n + getIncr(exId);
  // Keep clean number: avoid floating point like 102.50000000001
  return parseFloat(result.toFixed(3)).toString();
}

function parseRepRange(repsStr) {
  const s = (repsStr || '').trim();
  // Beat / AMRAP / failure / match
  if (/amrap|failure|beat|match/i.test(s)) return { type: 'beat' };
  // Triple Progression star notation: "12 / 8 / 5 ★" or "15 / 12 / 10 ★"
  if (s.includes('★')) {
    const nums = s.match(/\d+/g);
    if (nums && nums.length >= 2) return { type: 'tp', tiers: nums.map(Number) };
  }
  // Pyramid per-set: "Pyramid: 12–15 → 8–10 → 5–8"
  if (/pyramid/i.test(s)) {
    const ranges = [...s.matchAll(/(\d+)[–\-](\d+)/g)].map(m => ({ min: +m[1], max: +m[2] }));
    if (ranges.length) return { type: 'pyramid', perSet: ranges };
  }
  // Simple range: "8–12", "10–15 each"
  const rm = s.match(/(\d+)[–\-](\d+)/);
  if (rm) return { type: 'range', min: +rm[1], max: +rm[2] };
  return { type: 'beat' };
}

function suggestNextSets(ex, prevSets) {
  if (!prevSets || !prevSets.length) return null;
  const hasPrev = prevSets.some(s => (parseFloat(s.w) || 0) > 0 || (parseInt(s.r) || 0) > 0);
  if (!hasPrev) return null;

  const parsed = parseRepRange(ex.reps);
  const prog   = (ex.prog || '').toLowerCase();

  const isBeat = parsed.type === 'beat' || prog.includes('beat');
  const isDDP  = prog.includes('dynamic') || prog.includes('ddp');
  const isTP   = parsed.type === 'tp'    || prog.includes('triple');

  const suggestions = [];

  // ── BEAT LAST ──────────────────────────────
  if (isBeat) {
    prevSets.forEach(s => {
      suggestions.push({ w: s.w || '', r: s.r || '', action: 'beat' });
    });
    return suggestions;
  }

  // ── TRIPLE PROGRESSION ─────────────────────
  if (isTP) {
    const tiers = parsed.tiers || [12, 8, 5];
    prevSets.forEach((s, i) => {
      const prevR = parseInt(s.r)   || 0;
      const prevW = parseFloat(s.w) || 0;
      if (!prevW && !prevR) { suggestions.push(null); return; }

      // Infer current tier by closest match to prev top-set reps
      let tierIdx = 0, minD = Infinity;
      tiers.forEach((t, idx) => { const d = Math.abs(t - prevR); if (d < minD) { minD = d; tierIdx = idx; } });
      const tier = tiers[tierIdx];

      if (i === 0) {
        // Top set: hit tier → add weight, start 2 below tier
        if (prevR >= tier) {
          suggestions.push({ w: addWeight(s.w, ex.id), r: Math.max(tier - 2, 1).toString(), action: 'addWeight' });
        } else {
          suggestions.push({ w: s.w, r: (prevR + 1).toString(), action: 'addRep' });
        }
      } else {
        // Back-off sets progress faster
        if (prevR >= tier + 1) {
          suggestions.push({ w: addWeight(s.w, ex.id), r: Math.max(tier - 1, 1).toString(), action: 'addWeight' });
        } else {
          suggestions.push({ w: s.w, r: (prevR + 1).toString(), action: 'addRep' });
        }
      }
    });
    return suggestions;
  }

  // ── PYRAMID ────────────────────────────────
  if (parsed.type === 'pyramid') {
    prevSets.forEach((s, i) => {
      const prevR = parseInt(s.r)   || 0;
      const prevW = parseFloat(s.w) || 0;
      if (!prevW && !prevR) { suggestions.push(null); return; }
      const range = parsed.perSet[Math.min(i, parsed.perSet.length - 1)];
      if (prevR >= range.max) {
        suggestions.push({ w: addWeight(s.w, ex.id), r: range.min.toString(), action: 'addWeight' });
      } else {
        suggestions.push({ w: s.w, r: Math.min(prevR + 1, range.max).toString(), action: 'addRep' });
      }
    });
    return suggestions;
  }

  // ── RANGE (DP or DDP) ──────────────────────
  if (parsed.type === 'range') {
    const { min, max } = parsed;
    if (isDDP) {
      // Each set progresses independently
      prevSets.forEach(s => {
        const prevR = parseInt(s.r)   || 0;
        const prevW = parseFloat(s.w) || 0;
        if (!prevW && !prevR) { suggestions.push(null); return; }
        if (prevR >= max) {
          suggestions.push({ w: addWeight(s.w, ex.id), r: min.toString(), action: 'addWeight' });
        } else {
          suggestions.push({ w: s.w, r: Math.min(prevR + 1, max).toString(), action: 'addRep' });
        }
      });
    } else {
      // DP: all sets must hit max before weight increases
      const validPrev = prevSets.filter(s => (parseInt(s.r) || 0) > 0);
      const allHitMax = validPrev.length > 0 && validPrev.every(s => (parseInt(s.r) || 0) >= max);
      prevSets.forEach(s => {
        const prevR = parseInt(s.r)   || 0;
        const prevW = parseFloat(s.w) || 0;
        if (!prevW && !prevR) { suggestions.push(null); return; }
        if (allHitMax) {
          suggestions.push({ w: addWeight(s.w, ex.id), r: min.toString(), action: 'addWeight' });
        } else {
          suggestions.push({ w: s.w, r: Math.min(prevR + 1, max).toString(), action: 'addRep' });
        }
      });
    }
    return suggestions;
  }

  return null;
}

// Returns the best available source sets + a display label.
// Priority: previous session > current session logged so far (if active)
function getSourceData(dayId, exId) {
  const prev = getPrevData(dayId, exId);
  if (prev) return { sets: prev.sets, label: `from ${fmtDate(prev.date)}`, isToday: false };
  // Fallback: current active session's logged sets (so suggestion bar appears mid-workout)
  if (activeSessionKey) {
    const cur = getExData(dayId, exId);
    const hasData = cur.some(s => (parseFloat(s.w) || 0) > 0 || (parseInt(s.r) || 0) > 0);
    if (hasData) return { sets: cur, label: 'after today', isToday: true };
  }
  return null;
}

function buildSuggBar(dayId, ex) {
  const source = getSourceData(dayId, ex.id);
  if (!source) return '';
  const sugg = suggestNextSets(ex, source.sets);
  if (!sugg || !sugg.some(s => s !== null)) return '';

  const chips = sugg.map((s, i) => {
    if (!s) return '';
    const wDisp = s.w ? s.w : '';
    const rDisp = s.r ? `×${s.r}` : '';
    const display = [wDisp, rDisp].filter(Boolean).join(' ');
    let arrClass = 'beat', arrSymbol = '▷', chipClass = '';
    if (s.action === 'addWeight') { arrClass = 'wt';  arrSymbol = '↑'; chipClass = 'c-wt'; }
    if (s.action === 'addRep')    { arrClass = 'rep'; arrSymbol = '↑'; chipClass = 'c-rep'; }
    return `<div class="sugg-chip ${chipClass}"
      data-sugg-id="${dayId}_${ex.id}_${i}"
      onclick="applySugg('${dayId}','${ex.id}',${i})">
      <span class="sugg-snum">S${i+1}</span>
      <span class="sugg-val">${display || '—'}</span>
      <span class="sugg-arr ${arrClass}">${arrSymbol}</span>
    </div>`;
  }).join('');

  return `<div class="sugg-bar" id="suggbar_${dayId}_${ex.id}">
    <div class="sugg-top">
      <span class="sugg-lbl">⚡ Next Session</span>
      <div class="sugg-meta">
        <span class="sugg-date">${source.label}</span>
        <button class="sugg-fill-all" onclick="applyAllSugg('${dayId}','${ex.id}',event)">Fill All</button>
      </div>
    </div>
    <div class="sugg-chips">${chips}</div>
  </div>`;
}

// Re-renders just the suggestion bar inside an open logger (called after markDone)
function refreshSuggBar(dayId, exId) {
  const day = DAYS.find(d => d.id === dayId);
  const ex  = day?.exercises.find(e => e.id === exId);
  if (!ex) return;
  const existing = document.getElementById(`suggbar_${dayId}_${exId}`);
  const newHtml  = buildSuggBar(dayId, ex);
  if (existing) {
    if (newHtml) {
      const tmp = document.createElement('div');
      tmp.innerHTML = newHtml;
      existing.replaceWith(tmp.firstElementChild);
    }
    // If bar already exists and newHtml is empty, leave it (shouldn't happen once shown)
  } else {
    // Bar not yet in DOM — insert it before col-hdrs
    const colHdrs = document.querySelector(`#logger_${dayId}_${exId} .col-hdrs`);
    if (colHdrs && newHtml) {
      const tmp = document.createElement('div');
      tmp.innerHTML = newHtml;
      colHdrs.parentNode.insertBefore(tmp.firstElementChild, colHdrs);
    }
  }
}

function applySugg(dayId, exId, idx) {
  const day    = DAYS.find(d => d.id === dayId);
  const ex     = day?.exercises.find(e => e.id === exId);
  const source = getSourceData(dayId, exId);
  if (!ex || !source) return;
  const sugg = suggestNextSets(ex, source.sets);
  if (!sugg || !sugg[idx]) return;
  const s = sugg[idx];
  const wEl = document.getElementById(`w_${dayId}_${exId}_${idx}`);
  const rEl = document.getElementById(`r_${dayId}_${exId}_${idx}`);
  if (wEl && s.w) { wEl.value = s.w; wEl.classList.remove('ghost'); }
  if (rEl && s.r) { rEl.value = s.r; rEl.classList.remove('ghost'); }
  onInput(dayId, exId, idx);
  // Confirm flash
  const chip = document.querySelector(`[data-sugg-id="${dayId}_${exId}_${idx}"]`);
  if (chip) {
    chip.style.background = 'rgba(48,209,88,.18)';
    setTimeout(() => { chip.style.background = ''; }, 380);
  }
}

function applyAllSugg(dayId, exId, e) {
  e.stopPropagation();
  const day    = DAYS.find(d => d.id === dayId);
  const ex     = day?.exercises.find(e => e.id === exId);
  const source = getSourceData(dayId, exId);
  if (!ex || !source) return;
  const sugg = suggestNextSets(ex, source.sets);
  if (!sugg) return;
  sugg.forEach((s, i) => { if (s) applySugg(dayId, exId, i); });
}

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTick() {
  try {
    initAudio();
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
    g.connect(audioCtx.destination);
    const o = audioCtx.createOscillator();
    o.frequency.value = 1100;
    o.type = 'sine';
    o.connect(g);
    o.start(now);
    o.stop(now + 0.1);
  } catch(e) {}
}

function playDone() {
  try {
    initAudio();
    [[0,660],[180,770],[360,880]].forEach(([delay, freq]) => {
      const now = audioCtx.currentTime + delay / 1000;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.18, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      g.connect(audioCtx.destination);
      const o = audioCtx.createOscillator();
      o.frequency.value = freq; o.type = 'sine';
      o.connect(g); o.start(now); o.stop(now + 0.25);
    });
  } catch(e) {}
}

function doVibrate() {
  if ('vibrate' in navigator) navigator.vibrate([100,60,100,60,200]);
}

// ═══════════════════════════════════════════════
// TIMER  (Date.now-based, survives tab visibility changes)
// ═══════════════════════════════════════════════
let timerEndTime  = null;   // absolute ms when timer hits zero
let timerDuration = 0;      // total seconds
let timerPausedMs = null;   // remaining ms when paused
let timerRaf      = null;
let lastTickSec   = -1;

function startTimer(secs) {
  initAudio();
  cancelAnimationFrame(timerRaf);
  timerDuration = secs;
  timerEndTime  = Date.now() + secs * 1000;
  timerPausedMs = null;
  lastTickSec   = -1;

  // highlight preset
  document.querySelectorAll('.timer-pre').forEach(b =>
    b.classList.toggle('sel', +b.dataset.s === secs));

  document.getElementById('timerBar').classList.add('show');
  document.getElementById('tPauseBtn').textContent = '⏸';
  timerRaf = requestAnimationFrame(timerTick);
}

function timerTick() {
  if (timerPausedMs !== null) return;

  const remMs   = timerEndTime - Date.now();
  const remSecs = Math.ceil(remMs / 1000);

  if (remMs <= 0) {
    renderTimer(0, 'done');
    timerEndTime = null;
    playDone();
    doVibrate();
    return;
  }

  // 3-2-1 tick beeps
  if (remSecs <= 3 && remSecs !== lastTickSec) {
    lastTickSec = remSecs;
    playTick();
  }

  renderTimer(remSecs, remMs <= 10000 ? 'urgent' : 'normal');
  timerRaf = requestAnimationFrame(timerTick);
}

function renderTimer(secs, state) {
  const m = Math.floor(secs/60), s = secs%60;
  const el = document.getElementById('tCount');
  el.textContent = state === 'done' ? 'GO!' : `${m}:${s.toString().padStart(2,'0')}`;
  el.className = 'timer-count' + (state==='urgent'?' urgent': state==='done'?' done':'');

  const pct = timerDuration > 0 ? Math.max(0, secs / timerDuration * 100) : 0;
  const fill = document.getElementById('tFill');
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (state==='urgent'?' urgent':'');
}

function pauseTimer() {
  if (timerPausedMs !== null) {
    // resume
    timerEndTime  = Date.now() + timerPausedMs;
    timerPausedMs = null;
    document.getElementById('tPauseBtn').textContent = '⏸';
    timerRaf = requestAnimationFrame(timerTick);
  } else {
    // pause
    timerPausedMs = Math.max(0, timerEndTime - Date.now());
    cancelAnimationFrame(timerRaf);
    document.getElementById('tPauseBtn').textContent = '▶';
  }
}

function dismissTimer() {
  cancelAnimationFrame(timerRaf);
  timerEndTime = timerPausedMs = null;
  document.getElementById('timerBar').classList.remove('show');
  document.querySelectorAll('.timer-pre').forEach(b => b.classList.remove('sel'));
}

// Recover timer after tab returns
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (!timerEndTime || timerPausedMs !== null) return;
  cancelAnimationFrame(timerRaf);
  if (timerEndTime - Date.now() <= 0) {
    renderTimer(0, 'done');
    timerEndTime = null;
    playDone();
  } else {
    timerRaf = requestAnimationFrame(timerTick);
  }
});

// Unlock audio on first touch
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('mousedown',  initAudio, { once: true });

function renderContent() {
  const area = document.getElementById('scroll');
  if (activeDay === 'info') {
    area.innerHTML = renderInfoPage();
    attachFAQ();
    return;
  }
  if (activeDay === 'log') {

  const badgeMap = { upper:'badge-upper', lower:'badge-lower', both:'badge-both' };
  const labelMap = { upper:'Upper', lower:'Lower', both:'Back + Legs' };

  // Determine if THIS day is the active workout
  const isThisDay = wktActive && wktDayId === day.id;
  const canStart  = !wktActive;

  const startBtn = canStart
    ? `<div class="start-row">
        <button class="btn-start" onclick="startWorkout('${day.id}')">Start Workout</button>
      </div>` : '';

  let html = `<div class="day-hdr">
    <div>
      <div class="day-title">${day.label} — ${day.sub}</div>
    </div>
    <span class="badge ${badgeMap[day.type]}">${labelMap[day.type]}</span>
  </div>
  ${startBtn}`;

  day.exercises.forEach((ex, i) => {
    html += renderExCard(day.id, ex, i + 1);
  });

  area.innerHTML = html;
}

// ═══════════════════════════════════════════════
// EXERCISE CARD
// ═══════════════════════════════════════════════

    <div class="ex-hdr" onclick="toggleCard('${ex.id}')">
      <div class="ex-meta">
        <div class="ex-num">Exercise ${num}</div>
        ${ex.opt ? '<div class="ex-opt">Optional</div>' : ''}
        <div class="ex-name">${ex.name}</div>
        <div class="ex-tags">
          <span class="ex-tag t-sets">${ex.sets} sets</span>
          <span class="ex-tag t-reps">${ex.reps}</span>
          ${restTag}
          <span class="ex-tag t-prog">${ex.prog}</span>
        </div>
      </div>
      <span class="ex-chev">›</span>
    </div>
    <div class="ex-body">
      <div class="info-block">
        <div class="info-lbl">Options</div>
        <div class="info-txt">${ex.opts}</div>
      </div>
      <div class="info-block">
        <div class="info-lbl">Scheme</div>
        <div class="info-txt">${ex.scheme}</div>
      </div>
      ${ex.note ? `
        <button class="notes-btn" id="nbtn_${ex.id}" onclick="toggleNotes('${ex.id}')">
          Form &amp; Coach Notes
          <span class="notes-btn-icon">▼</span>
        </button>
        <div class="notes-body" id="notes_${ex.id}">${ex.note}</div>

// ═══════════════════════════════════════════════
// LOGGER
// ═══════════════════════════════════════════════
function buildLogger(dayId, ex) {
  const todaySets = getExData(dayId, ex.id);
  const prev      = getPrevData(dayId, ex.id);
  const prevSets  = prev ? prev.sets : null;

  const prevBadge = prev
    ? `<span class="logger-prev">Last: ${fmtDate(prev.date)}</span>` : '';

  const wtLabel = 'Wt kg';

  const restBtns = ex.rest ? `<div class="rest-row">
    <button class="rest-btn main" data-s="${ex.rest}" onclick="startTimer(${ex.rest})">▶ ${fmtTime(ex.rest)}</button>
    ${ex.rest!==90  ? `<button class="rest-btn" onclick="startTimer(90)">1:30</button>` : ''}
    ${ex.rest!==120 ? `<button class="rest-btn" onclick="startTimer(120)">2:00</button>` : ''}
    ${ex.rest!==180 ? `<button class="rest-btn" onclick="startTimer(180)">3:00</button>` : ''}
  </div>` : '';

  const suggBar = buildSuggBar(dayId, ex);

  return `
    <div class="logger-top">
      <span class="logger-lbl">Log Sets</span>
      <div class="logger-right">
        ${prevBadge}
        <div class="logger-acts">
          <button class="act act-add" onclick="addSet('${dayId}','${ex.id}')">+ Set</button>
          <button class="act act-clr" data-ex="${dayId}_${ex.id}" onclick="clearEx('${dayId}','${ex.id}')">Clear</button>
        </div>
      </div>
    </div>
    ${suggBar}
    <div class="col-hdrs">
      <div class="col-hdr">#</div>
      <div class="col-hdr wt-col-lbl">${wtLabel}</div>
      <div class="col-hdr">Reps</div>
      <div class="col-hdr">✓</div>
      <div class="col-hdr">−</div>
    </div>
    <div id="rows_${dayId}_${ex.id}">
      ${buildSetRows(dayId, ex, todaySets, prevSets)}
    </div>
    ${restBtns}`;
}

function buildSetRows(dayId, ex, todaySets, prevSets) {
  const n = Math.max(ex.sets, todaySets.length || 0, 1);
  let html = '';
  for (let i = 0; i < n; i++) {
    const sv = todaySets[i] || {};
    const pv = prevSets && prevSets[i] ? prevSets[i] : null;
    const wVal = sv.w || '';
    const rVal = sv.r || '';
    const isDone = sv.done || false;
    const wPh   = pv && pv.w ? pv.w : '';
    const rPh   = pv && pv.r ? pv.r : '';

    html += `<div class="set-row${isDone?' done':''}" id="sr_${dayId}_${ex.id}_${i}">
      <div class="s-num">${i+1}</div>
      <input type="number" inputmode="decimal"
        class="s-in${wPh&&!wVal?' ghost':''}"
        id="w_${dayId}_${ex.id}_${i}"
        value="${wVal}" placeholder="${wPh}"
        onchange="onInput('${dayId}','${ex.id}',${i})"
        onfocus="this.classList.remove('ghost')">
      <input type="number" inputmode="numeric"
        class="s-in${rPh&&!rVal?' ghost':''}"
        id="r_${dayId}_${ex.id}_${i}"
        value="${rVal}" placeholder="${rPh}"
        onchange="onInput('${dayId}','${ex.id}',${i})"
        onfocus="this.classList.remove('ghost')">
      <button class="done-btn${isDone?' on':''}"
        id="db_${dayId}_${ex.id}_${i}"
        onclick="markDone('${dayId}','${ex.id}',${i},${ex.rest})">
        ${isDone?'✓':''}
      </button>
      <button class="del-btn" onclick="deleteSet('${dayId}','${ex.id}',${i})">−</button>
    </div>`;
  }
  return html;
}

// ═══════════════════════════════════════════════
// TOGGLE HANDLERS
// ═══════════════════════════════════════════════
function toggleCard(exId) {
  const card = document.getElementById('card_' + exId);
  if (!card) return;
  card.classList.toggle('open');
  if (card.classList.contains('open'))
    setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
}

function toggleNotes(exId) {
  const body = document.getElementById('notes_' + exId);
  const btn  = document.getElementById('nbtn_' + exId);
  if (!body) return;
  const open = body.classList.toggle('show');
  btn && btn.classList.toggle('open', open);
}

// ═══════════════════════════════════════════════
// LOGGER ACTIONS
// ═══════════════════════════════════════════════
function currentRowCount(dayId, exId) {
  const c = document.getElementById(`rows_${dayId}_${exId}`);
  return c ? c.querySelectorAll('.set-row').length : 0;
}

function normalizeSets(dayId, exId, count) {
  let sets = getExData(dayId, exId);
  while (sets.length < count) sets.push({});
  return sets;
}

function refreshRows(dayId, exId) {
  const day = DAYS.find(d => d.id === dayId);
  const ex  = day?.exercises.find(e => e.id === exId);
  const container = document.getElementById(`rows_${dayId}_${exId}`);
  if (!ex || !container) return;
  const todaySets = getExData(dayId, exId);
  const prev      = getPrevData(dayId, exId);
  container.innerHTML = buildSetRows(dayId, ex, todaySets, prev ? prev.sets : null);
}

function onInput(dayId, exId, idx) {
  const w = document.getElementById(`w_${dayId}_${exId}_${idx}`)?.value || '';
  const r = document.getElementById(`r_${dayId}_${exId}_${idx}`)?.value || '';
  const count = currentRowCount(dayId, exId);
  let sets = normalizeSets(dayId, exId, count);
  sets[idx] = { ...sets[idx], w, r };
  setExData(dayId, exId, sets);
}

function markDone(dayId, exId, idx, restSecs) {
  onInput(dayId, exId, idx);
  const count = currentRowCount(dayId, exId);
  let sets = normalizeSets(dayId, exId, count);
  sets[idx].done = !sets[idx].done;
  setExData(dayId, exId, sets);

  const btn = document.getElementById(`db_${dayId}_${exId}_${idx}`);
  const row = document.getElementById(`sr_${dayId}_${exId}_${idx}`);
  if (btn) { btn.classList.toggle('on', sets[idx].done); btn.textContent = sets[idx].done ? '✓' : ''; }
  if (row) row.classList.toggle('done', sets[idx].done);
  if (sets[idx].done && restSecs) startTimer(restSecs);
  // Refresh suggestion bar — may appear for first time after first set is checked
  refreshSuggBar(dayId, exId);
}

function addSet(dayId, exId) {
  const count = currentRowCount(dayId, exId);
  let sets = normalizeSets(dayId, exId, count);
  const last = sets[sets.length - 1] || {};
  sets.push({ w: last.w || '', r: '', done: false });
  setExData(dayId, exId, sets);
  refreshRows(dayId, exId);
  // scroll new row into view
  const container = document.getElementById(`rows_${dayId}_${exId}`);
  if (container) {
    const last = container.lastElementChild;
    if (last) setTimeout(() => last.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
  }
}

function deleteSet(dayId, exId, idx) {
  const count = currentRowCount(dayId, exId);
  if (count <= 1) return; // keep at least 1 row
  let sets = normalizeSets(dayId, exId, count);
  sets.splice(idx, 1);
  setExData(dayId, exId, sets);
  refreshRows(dayId, exId);
}

function clearEx(dayId, exId) {
  const btn = document.querySelector(`.act-clr[data-ex="${dayId}_${exId}"]`);
  if (btn && btn.dataset.armed !== 'true') {
    btn.dataset.armed    = 'true';
    btn.textContent      = 'Sure?';
    btn.style.background = 'rgba(255,69,58,.25)';
    setTimeout(() => {
      if (btn.dataset.armed === 'true') {
        btn.dataset.armed    = 'false';
        btn.textContent      = 'Clear';
        btn.style.background = '';
      }
    }, 2500);
    return;
  }
  if (btn) { btn.dataset.armed = 'false'; btn.textContent = 'Clear'; btn.style.background = ''; }
  if (!activeSessionKey) return;
  const s = getSessions();
  if (s[activeSessionKey]) {
    delete s[activeSessionKey][`${dayId}__${exId}`];
    saveSessions(s);
  }
  refreshRows(dayId, exId);
  const day = DAYS.find(d => d.id === dayId);
  const ex  = day?.exercises.find(e => e.id === exId);
  if (ex) {
    const loggerEl = document.getElementById(`logger_${dayId}_${exId}`);
    if (loggerEl) loggerEl.innerHTML = buildLogger(dayId, ex);
  }
}
